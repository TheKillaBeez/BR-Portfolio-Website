<!DOCTYPE html>
<html lang="en-us">
    
<head>
  <meta charset="utf-8">
  <title> Ben Richardson Contact</title>
  <link href="css/main.css" type="text/css" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/mpw7ywy.css">
  <link rel="stylesheet" href="https://use.typekit.net/mpw7ywy.css">
  <link rel="icon" type="image/png" href="images/Favicon-2.png">
</head>

<body>
    <main>
        <header> 
            <h1>Contact Me:</a></h1>
        </header>
        <nav class="topnav" id="myTopnav">
            <a href="index.html">Home</a>
            <a href="Graphic-design-work.html">Graphic Design Work</a>
            <a href="Video-projects.html">Video Projects</a>
            <a href="Loyola-Esports.html">Loyola Esports Work</a>
            <a href="Capstone-Work.html">Capstone Project</a>
            <a href="Contact.html">Contact Me</a>

            <!-- Hamburger icon -->
            <a href="javascript:void(0);" class="icon" onclick="myFunction()">
                ☰
            </a>
        </nav>
        
        <div class="contact-form">
            <h2>Please fill out the Information Bellow:</h2>
            <form>
                <p>Name & Email here: <input type="text" name="Name" placeholder="First & last" required>
                <input type="text" name="Email" placeholder="name@domain.com" required></p>
                
                <p>Reason for inquiry: <select name="Reason for inquiry">
                    <option value="Job-opportunity"> Job opportunity</option>
                    <option value="freelance-inquiry"> Freelance inquiry</option>
                    <option value="interview-request"> Interview request</option>
                    <option value="Other"> Other</option>
                </select></p>
                <p>Area of interest:
                <input type="checkbox" name="Graphic Design" value="Graphic Design"> Graphic Design
                <input type="checkbox" name="Internships" value="Internships"> Internship
                <input type="checkbox" name="Video Projects" value="Video Projects"> Video Projects
                <input type="checkbox" name="Other" value="Other"> Other</p>
                
                <p>Message for Me: <textarea name="comment">Type here</textarea></p>
                <p><button name="submit">
                    Submit
                </button></p>
            </form>
        </div>
    </main>
</body>
<script>
    /* Toggle between adding and removing the "responsive" class to topnav when the user clicks on the icon */
    function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
        x.className += " responsive";
    } else {
        x.className = "topnav";
    }
    }
</script>
</html>
